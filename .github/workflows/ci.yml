name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # uv's universal resolver requires all optional extras to be resolvable.
        # [stack] packages are not yet on PyPI, so we use pip (which only resolves
        # requested extras) via a seeded venv.
        run: |
          uv venv --seed --python ${{ matrix.python-version }}
          .venv/bin/pip install -e ".[dev]" --quiet

      - name: Lint (ruff)
        run: .venv/bin/ruff check .

      - name: Format check (ruff)
        run: .venv/bin/ruff format --check .

      - name: Run tests
        run: .venv/bin/pytest

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.11
      - name: Install docs dependencies
        run: |
          uv venv --seed --python 3.11
          .venv/bin/pip install -e ".[docs]" --quiet
      - run: .venv/bin/mkdocs build --strict
